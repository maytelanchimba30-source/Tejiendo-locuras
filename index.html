<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tejiendo Locuras | Administrador</title>
    <style>
        /* ESTILO MINIMALISTA PROFESIONAL */
        :root { --negro: #1a1a1a; --gris: #f5f5f7; --oro: #ffcc00; }
        body { font-family: 'Helvetica Neue', Arial; margin: 0; background: white; }
        
        header { display: flex; justify-content: space-between; padding: 20px 5%; border-bottom: 1px solid #eee; position: sticky; top: 0; background: white; z-index: 100; }
        .logo { font-weight: bold; letter-spacing: 2px; font-size: 20px; }
        
        .main-container { display: grid; grid-template-columns: 200px 1fr; gap: 30px; padding: 40px 5%; }
        .filter-list { list-style: none; padding: 0; font-size: 13px; color: #666; cursor: pointer; }
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { border-radius: 4px; transition: 0.3s; text-align: center; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .btn-add { width: 100%; padding: 10px; background: var(--negro); color: white; border: none; cursor: pointer; font-size: 11px; margin-top: 5px; }

        /* MODALES */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 200; }
        .modal-content { background: white; padding: 30px; border-radius: 8px; width: 400px; position: relative; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; box-sizing: border-box; }
        
        .knitting-icon { position: fixed; bottom: 10px; right: 10px; width: 60px; }
    </style>
</head>
<body>

<header>
    <div class="logo">TEJIENDO LOCURAS</div>
    <div>
        <button onclick="openM('modal-login')" style="background:none; border:none; cursor:pointer; font-weight:bold;">LOGIN</button>
        <button onclick="openM('modal-cart')" style="background:none; border:none; cursor:pointer; font-weight:bold;">CARRITO (<span id="cart-count">0</span>)</button>
    </div>
</header>

<div class="main-container">
    <aside>
        <ul class="filter-list">
            <li onclick="render(productos)">TODOS LOS PRODUCTOS</li>
            <li onclick="filtrar('amigurumi animales')">ANIMALES</li>
            <li onclick="filtrar('ropa a crochet')">ROPA</li>
            <li onclick="filtrar('personaje de anime')">ANIME</li>
        </ul>
    </aside>
    <main class="product-grid" id="grid"></main>
</div>

<!-- MODAL LOGIN -->
<div class="modal" id="modal-login">
    <div class="modal-content">
        <span onclick="closeM('modal-login')" style="position:absolute; right:15px; cursor:pointer;">&times;</span>
        <h2>Iniciar Sesión</h2>
        <input type="text" placeholder="Usuario">
        <input type="password" placeholder="Contraseña">
        <button class="btn-add" onclick="alert('Iniciando...')">ENTRAR</button>
    </div>
</div>

<!-- MODAL CARRITO -->
<div class="modal" id="modal-cart">
    <div class="modal-content">
        <span onclick="closeM('modal-cart')" style="position:absolute; right:15px; cursor:pointer;">&times;</span>
        <h2>Tu Carrito</h2>
        <div id="cart-items"></div>
        <button class="btn-add" onclick="alert('¡Compra enviada a la administradora!')">FINALIZAR COMPRA</button>
    </div>
</div>

<img src="https://img.freepik.com/vector-premium/lindo-personaje-anime-chibi-tejiendo-bufanda-lana_1030444-42.jpg" class="knitting-icon">

<script>
    // LISTA DE TUS PRODUCTOS
    const productos = [
        { id: 1, nombre: "Gatito Alien", precio: 4, cat: "amigurumi animales", img: "https://i.pinimg.com/736x/1d/ea/04/1dea043bf91c7c9043c72e15811dd033.jpg" },
        { id: 2, nombre: "Gato", precio: 4, cat: "amigurumi animales", img: "https://i.pinimg.com/736x/a4/86/0a/a4860a61536d8bd34280e246f2180167.jpg" },
        { id: 4, nombre: "Vestido Azul", precio: 40, cat: "ropa a crochet", img: "https://i.pinimg.com/736x/7b/3f/cf/7b3fcfd955a4edd6a11979f6491f737c.jpg" },
        { id: 10, nombre: "Bakugo", precio: 20, cat: "personaje de anime", img: "https://i.pinimg.com/webp85/736x/bb/87/98/bb8798d739937f61c772d80585ad8df9.webp" },
        { id: 11, nombre: "Pucca y Garu", precio: 14, cat: "personaje de anime", img: "https://i.pinimg.com/1200x/e1/c6/3e/e1c63e95fac1efbbfbcd3c158e42680f.jpg" }
    ];

    let carrito = [];

    function render(lista) {
        const grid = document.getElementById('grid');
        grid.innerHTML = lista.map(p => `
            <div class="card">
                <img src="${p.img}">
                <p style="font-size:12px; margin:5px 0;">${p.nombre}</p>
                <p><b>$${p.precio}</b></p>
                <button class="btn-add" onclick="add(${p.id})">COMPRAR</button>
            </div>
        `).join('');
    }

    function filtrar(c) { render(productos.filter(p => p.cat === c)); }
    function openM(id) { document.getElementById(id).style.display = 'flex'; }
    function closeM(id) { document.getElementById(id).style.display = 'none'; }

    function add(id) {
        carrito.push(productos.find(p => p.id === id));
        document.getElementById('cart-count').innerText = carrito.length;
        document.getElementById('cart-items').innerHTML = carrito.map(i => `<p>${i.nombre} - $${i.price}</p>`).join('');
    }

    // PANEL SECRETO PARA TI
    document.addEventListener('keydown', (e) => {
        if (e.key === 'a' && e.ctrlKey) {
            let pass = prompt("Clave Admin:");
            if(pass === "Locuras2026") alert("Bienvenida dueña de Tejiendo Locuras. Inventario cargado.");
        }
    });

    render(productos);
</script>
</body>
</html>
