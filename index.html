<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tejiendo Locuras | Tienda Oficial</title>
    <style>
        :root { --negro: #111; --blanco: #fff; --gris: #f4f4f4; --oro: #c5a059; --lila: #9575cd; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--blanco); color: var(--negro); }

        /* --- NAVEGACIÓN --- */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 8%; border-bottom: 1px solid #eee; position: sticky; top: 0; background: white; z-index: 1000;
        }
        .logo { font-size: 22px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; }
        
        .nav-links { display: flex; gap: 30px; align-items: center; }
        
        /* Dropdown de Categorías */
        .dropdown { position: relative; display: inline-block; }
        .dropbtn { font-size: 13px; font-weight: 700; text-transform: uppercase; cursor: pointer; border: none; background: none; }
        .dropdown-content { 
            display: none; position: absolute; background: white; min-width: 200px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.1); z-index: 1; border: 1px solid #eee;
        }
        .dropdown-content a { color: black; padding: 12px 16px; text-decoration: none; display: block; font-size: 13px; }
        .dropdown-content a:hover { background-color: var(--gris); }
        .dropdown:hover .dropdown-content { display: block; }

        .cart-icon { cursor: pointer; font-weight: 700; font-size: 13px; text-transform: uppercase; }

        /* --- GRID DE PRODUCTOS --- */
        .container { padding: 40px 8%; text-align: center; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 40px; margin-top: 30px; }
        
        .card { transition: 0.3s; cursor: pointer; border: 1px solid transparent; padding: 10px; }
        .card:hover { border: 1px solid #eee; }
        .card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; background: var(--gris); }
        .card h4 { font-size: 14px; text-transform: uppercase; margin: 15px 0 5px; font-weight: 400; }
        .card .price { font-weight: 700; margin-bottom: 15px; }
        
        .btn-add { 
            width: 100%; background: var(--negro); color: white; border: none; 
            padding: 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; cursor: pointer;
        }

        /* --- MODALES --- */
        .modal { position: fixed; inset: 0; background: white; display: none; z-index: 2000; overflow-y: auto; padding: 60px 0; }
        .modal-content { max-width: 900px; margin: auto; padding: 20px; position: relative; }
        .close-modal { position: absolute; top: 0; right: 20px; font-size: 35px; cursor: pointer; }

        /* --- ADMIN PANEL --- */
        .admin-view { background: var(--gris); padding: 40px; border-radius: 8px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 30px; background: white; }
        .admin-table th, .admin-table td { border: 1px solid #eee; padding: 15px; text-align: left; font-size: 14px; }

        /* --- CHAT --- */
        #chat-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--negro); color: white; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; z-index: 3000; }
        #chat-box { position: fixed; bottom: 100px; right: 30px; width: 320px; background: white; border: 1px solid #eee; box-shadow: 0 5px 20px rgba(0,0,0,0.1); border-radius: 10px; display: none; flex-direction: column; z-index: 3000; }
        .chat-header { background: var(--negro); color: white; padding: 15px; border-radius: 10px 10px 0 0; font-size: 14px; font-weight: bold; }
        .chat-messages { height: 250px; overflow-y: auto; padding: 15px; font-size: 13px; }

        .stars { color: #ddd; font-size: 20px; cursor: pointer; margin: 10px 0; }
        .stars .active { color: var(--oro); }
    </style>
</head>
<body>

<header>
    <div class="logo">Tejiendo Locuras</div>
    <div class="nav-links">
        <div class="dropdown">
            <span class="dropbtn">Colecciones ▼</span>
            <div class="dropdown-content">
                <a href="#" onclick="render(productos)">Todos los productos</a>
                <a href="#" onclick="filter('amigurumi animales')">Animales</a>
                <a href="#" onclick="filter('ropa a crochet')">Ropa</a>
                <a href="#" onclick="filter('personaje de anime')">Anime</a>
                <a href="#" onclick="filter('accesorio y llavero')">Accesorios</a>
            </div>
        </div>
        <span class="cart-icon" onclick="openModal('cart-modal')">Carrito (<span id="cart-count">0</span>)</span>
    </div>
</header>

<div class="container">
    <h2 id="view-title">Todos los productos</h2>
    <div class="product-grid" id="main-grid"></div>
</div>

<!-- MODAL: DETALLE Y RESEÑAS -->
<div class="modal" id="detail-modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal('detail-modal')">&times;</span>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px;">
            <div id="detail-img-box"></div>
            <div>
                <h2 id="detail-name"></h2>
                <p id="detail-price" style="font-size: 22px; font-weight: bold; margin: 15px 0;"></p>
                <hr>
                <div class="stars" id="star-input">
                    <span onclick="setRate(1)">★</span><span onclick="setRate(2)">★</span><span onclick="setRate(3)">★</span><span onclick="setRate(4)">★</span><span onclick="setRate(5)">★</span>
                </div>
                <textarea id="review-text" placeholder="Escribe tu opinión..." style="width:100%; height:80px; padding:10px;"></textarea>
                <button class="btn-add" onclick="saveReview()" style="margin-top:10px;">Publicar Reseña</button>
                <div id="review-list" style="margin-top:30px; border-top:1px solid #eee; padding-top:20px;"></div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL: CARRITO -->
<div class="modal" id="cart-modal">
    <div class="modal-content" style="max-width: 500px;">
        <span class="close-modal" onclick="closeModal('cart-modal')">&times;</span>
        <h2>Tu Carrito</h2>
        <div id="cart-items" style="margin: 30px 0;"></div>
        <div style="border-top: 2px solid black; padding-top: 20px;">
            <h3>Total: $<span id="cart-total">0.00</span></h3>
            <button class="btn-add" style="margin-top: 20px;" onclick="openModal('checkout-modal')">Finalizar Compra</button>
        </div>
    </div>
</div>

<!-- MODAL: ADMIN (SECRETO) -->
<div class="modal" id="admin-modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal('admin-modal')">&times;</span>
        <div id="admin-login">
            <h2>Acceso Administrativo</h2>
            <input type="password" id="admin-pass" placeholder="Contraseña Maestra">
            <button class="btn-add" onclick="accessAdmin()">Entrar</button>
        </div>
        <div id="admin-panel" style="display:none;">
            <h2>Gestión de Tejiendo Locuras</h2>
            <div class="admin-view">
                <h3>Agregar Nuevo Producto</h3>
                <input type="text" id="add-n" placeholder="Nombre">
                <input type="number" id="add-p" placeholder="Precio">
                <select id="add-c">
                    <option value="amigurumi animales">Animales</option>
                    <option value="ropa a crochet">Ropa</option>
                    <option value="personaje de anime">Anime</option>
                    <option value="accesorio y llavero">Accesorios</option>
                </select>
                <input type="text" id="add-i" placeholder="URL de Imagen">
                <button class="btn-add" onclick="createProduct()">Añadir a la Tienda</button>
            </div>
            <table class="admin-table">
                <thead><tr><th>Producto</th><th>Precio</th><th>Acción</th></tr></thead>
                <tbody id="admin-table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- CHAT -->
<button id="chat-btn" onclick="toggleChat()">💬</button>
<div id="chat-box">
    <div class="chat-header">Asistente Tejiendo Locuras</div>
    <div class="chat-messages" id="chat-msgs"></div>
    <div style="display:flex; padding:10px;">
        <input type="text" id="chat-in" placeholder="Escribe..." style="margin:0; flex:1;">
        <button onclick="send()" style="padding:10px; background:none; border:none; cursor:pointer;">➤</button>
    </div>
</div>

<script>
    // Base de datos persistente
    let productos = JSON.parse(localStorage.getItem('tl_data')) || [
        { id: 1, nombre: "Gatito Alien", precio: 4, cat: "amigurumi animales", img: "https://i.pinimg.com/736x/1d/ea/04/1dea043bf91c7c9043c72e15811dd033.jpg", reviews: [] },
        { id: 2, nombre: "Bakugo Chibi", precio: 20, cat: "personaje de anime", img: "https://i.pinimg.com/webp85/736x/bb/87/98/bb8798d739937f61c772d80585ad8df9.webp", reviews: [] },
        { id: 3, nombre: "Tulipanes", precio: 1.5, cat: "accesorio y llavero", img: "https://i.pinimg.com/1200x/db/0b/e8/db0be87d6b2a2fd3a69e64c42f24d373.jpg", reviews: [] }
    ];

    let carrito = [];
    let currentId = null;
    let stars = 0;

    // --- COMANDO ADMIN SECRETO ---
    document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.shiftKey && e.key === 'A') openModal('admin-modal');
    });

    function render(lista) {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = lista.map(p => `
            <div class="card">
                <img src="${p.img}" onclick="openDetail(${p.id})">
                <h4>${p.nombre}</h4>
                <p class="price">$${p.precio.toFixed(2)}</p>
                <button class="btn-add" onclick="addToCart(${p.id})">Agregar al Carrito</button>
            </div>
        `).join('');
        renderAdmin();
    }

    function filter(cat) {
        document.getElementById('view-title').innerText = cat.toUpperCase();
        render(productos.filter(p => p.cat === cat));
    }

    function addToCart(id) {
        carrito.push(productos.find(p => p.id === id));
        document.getElementById('cart-count').innerText = carrito.length;
        updateCart();
    }

    function updateCart() {
        let total = 0;
        document.getElementById('cart-items').innerHTML = carrito.map(p => {
            total += p.precio;
            return `<div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>${p.nombre}</span> <strong>$${p.precio.toFixed(2)}</strong></div>`;
        }).join('') || "Vacio";
        document.getElementById('cart-total').innerText = total.toFixed(2);
    }

    // --- FUNCIONES ADMIN ---
    function accessAdmin() {
        if(document.getElementById('admin-pass').value === "Locuras2026") {
            document.getElementById('admin-login').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
        } else { alert("Error"); }
    }

    function renderAdmin() {
        document.getElementById('admin-table-body').innerHTML = productos.map(p => `
            <tr>
                <td>${p.nombre}</td>
                <td><input type="number" value="${p.precio}" onchange="editPrice(${p.id}, this.value)" style="width:80px;"></td>
                <td><button onclick="del(${p.id})" style="color:red; background:none; border:none; cursor:pointer;">Eliminar</button></td>
            </tr>
        `).join('');
    }

    function createProduct() {
        const n = document.getElementById('add-n').value;
        const p = document.getElementById('add-p').value;
        const c = document.getElementById('add-c').value;
        const i = document.getElementById('add-i').value;
        if(n && p && i) {
            productos.push({ id: Date.now(), nombre: n, precio: parseFloat(p), cat: c, img: i, reviews: [] });
            save(); render(productos);
        }
    }

    function editPrice(id, val) { productos.find(x => x.id === id).precio = parseFloat(val); save(); }
    function del(id) { productos = productos.filter(x => x.id !== id); save(); render(productos); }
    function save() { localStorage.setItem('tl_data', JSON.stringify(productos)); }

    // --- MODALES Y CHAT ---
    function openModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    
    function openDetail(id) {
        currentId = id;
        const p = productos.find(x => x.id === id);
        document.getElementById('detail-name').innerText = p.nombre;
        document.getElementById('detail-price').innerText = `$${p.precio.toFixed(2)}`;
        document.getElementById('detail-img-box').innerHTML = `<img src="${p.img}" style="width:100%;">`;
        drawReviews();
        openModal('detail-modal');
    }

    function setRate(n) {
        stars = n;
        const s = document.querySelectorAll('#star-input span');
        s.forEach((span, i) => span.classList.toggle('active', i < n));
    }

    function saveReview() {
        const txt = document.getElementById('review-text').value;
        if(stars === 0 || !txt) return alert("Completa la reseña");
        productos.find(x => x.id === currentId).reviews.push({ s: stars, t: txt });
        save(); drawReviews();
    }

    function drawReviews() {
        const p = productos.find(x => x.id === currentId);
        document.getElementById('review-list').innerHTML = p.reviews.map(r => `
            <div style="margin-bottom:15px;"><span style="color:var(--oro)">${'★'.repeat(r.s)}</span><br>${r.t}</div>
        `).join('') || "Sin reseñas";
    }

    function toggleChat() { 
        const c = document.getElementById('chat-box');
        c.style.display = (c.style.display === 'flex') ? 'none' : 'flex';
    }

    function send() {
        const i = document.getElementById('chat-in');
        if(!i.value) return;
        document.getElementById('chat-msgs').innerHTML += `<div style="text-align:right; margin-bottom:10px;"><b>Tú:</b> ${i.value}</div>`;
        setTimeout(() => {
            document.getElementById('chat-msgs').innerHTML += `<div style="margin-bottom:10px; color:var(--lila)"><b>Admin:</b> ¡Hola! En breve te atenderemos.</div>`;
        }, 500);
        i.value = "";
    }

    render(productos);
</script>
</body>
</html>
