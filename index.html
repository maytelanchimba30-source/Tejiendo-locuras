<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tejiendo Locuras | Gestión de Tienda</title>
    <style>
        :root { --negro: #1a1a1a; --gris: #f5f5f7; --oro: #ffcc00; --borde: #eeeeee; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; color: var(--negro); background: #fff; }
        
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 5%; border-bottom: 1px solid var(--borde); 
            position: sticky; top: 0; background: white; z-index: 1000; 
        }
        .logo { font-size: 20px; font-weight: bold; letter-spacing: 2px; text-decoration: none; color: black; }
        .nav-btns button { background: none; border: none; font-weight: 600; cursor: pointer; margin-left: 20px; font-size: 12px; text-transform: uppercase; }

        .container { display: grid; grid-template-columns: 200px 1fr; gap: 40px; padding: 40px 5%; }
        .sidebar h3 { font-size: 12px; text-transform: uppercase; color: #888; margin-bottom: 20px; }
        .filter-list { list-style: none; padding: 0; }
        .filter-list li { padding: 8px 0; font-size: 14px; cursor: pointer; color: #555; }
        .filter-list li:hover { color: black; font-weight: bold; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 30px; }
        .card { border-radius: 4px; transition: 0.3s; position: relative; cursor: pointer; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: var(--gris); }
        .card h4 { font-size: 13px; margin: 10px 0 5px; font-weight: normal; text-transform: uppercase; }
        .card .price { font-weight: bold; font-size: 14px; }
        .btn-buy { width: 100%; background: var(--negro); color: white; border: none; padding: 10px; margin-top: 10px; cursor: pointer; font-size: 11px; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; z-index: 2000; overflow-y: auto; }
        .modal-content { max-width: 1000px; margin: 40px auto; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; position: relative; }
        .close { position: absolute; top: 0; right: 20px; font-size: 30px; cursor: pointer; }

        .admin-section { grid-column: span 2; background: var(--gris); padding: 30px; border-radius: 8px; margin-top: 20px; }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        .admin-table th, .admin-table td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        input { padding: 10px; border: 1px solid #ddd; margin-bottom: 10px; width: 100%; box-sizing: border-box; }

        .stars { color: #ccc; font-size: 20px; cursor: pointer; }
        .stars .active { color: var(--oro); }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">TEJIENDO LOCURAS</a>
    <div class="nav-btns">
        <button onclick="openModal('admin-modal')">ADMIN</button>
        <button onclick="openModal('cart-modal')">CARRITO (<span id="cart-count">0</span>)</button>
    </div>
</header>

<div class="container">
    <aside class="sidebar">
        <h3>Colecciones</h3>
        <ul class="filter-list">
            <li onclick="renderStore(productos)">Todos</li>
            <li onclick="filterBy('amigurumi animales')">Animales</li>
            <li onclick="filterBy('personaje de anime')">Anime</li>
            <li onclick="filterBy('ropa a crochet')">Ropa</li>
        </ul>
    </aside>
    <main class="product-grid" id="main-grid"></main>
</div>

<!-- MODAL: ADMIN -->
<div class="modal" id="admin-modal">
    <div class="modal-content" style="display: block;">
        <span class="close" onclick="closeModal('admin-modal')">&times;</span>
        <div id="admin-auth">
            <h2>Acceso Administrativo</h2>
            <input type="password" id="admin-pass" placeholder="Contraseña">
            <button class="btn-buy" onclick="checkAdmin()">Entrar</button>
        </div>
        <div id="admin-controls" style="display: none;">
            <h2>Panel de Control</h2>
            <div class="admin-section">
                <h3>Agregar Producto</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="text" id="add-name" placeholder="Nombre">
                    <input type="number" id="add-price" placeholder="Precio">
                    <input type="text" id="add-cat" placeholder="Categoría">
                    <input type="text" id="add-img" placeholder="Link Pinterest">
                </div>
                <button class="btn-buy" onclick="addNewProduct()">+ Agregar</button>
            </div>
            <table class="admin-table">
                <thead><tr><th>Nombre</th><th>Precio</th><th>Acciones</th></tr></thead>
                <tbody id="admin-table-body"></tbody>
            </table>
            <button class="btn-buy" style="background: #28a745; margin-top: 20px;" onclick="generateCode()">Generar Código GitHub</button>
            <button class="btn-buy" style="background: #666; margin-top: 10px;" onclick="logoutAdmin()">Cerrar Sesión</button>
            <pre id="code-output" style="background:#000; color:#0f0; padding:10px; display:none; margin-top:10px; overflow-x: auto;"></pre>
        </div>
    </div>
</div>

<!-- Otros modales omitidos por brevedad, se mantienen iguales al código anterior -->

<script>
    let productos = [
        { id: 1, nombre: "Gatito Alien", precio: 4, cat: "amigurumi animales", img: "https://i.pinimg.com/736x/1d/ea/04/1dea043bf91c7c9043c72e15811dd033.jpg", reviews: [] },
        { id: 2, nombre: "Bakugo", precio: 20, cat: "personaje de anime", img: "https://i.pinimg.com/webp85/736x/bb/87/98/bb8798d739937f61c772d80585ad8df9.webp", reviews: [] },
        { id: 3, nombre: "Tulipanes", precio: 1.5, cat: "accesorio y llavero", img: "https://i.pinimg.com/1200x/db/0b/e8/db0be87d6b2a2fd3a69e64c42f24d373.jpg", reviews: [] }
    ];

    let cart = [];

    function renderStore(lista) {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = lista.map(p => `
            <div class="card">
                <img src="${p.img}">
                <h4>${p.nombre}</h4>
                <p class="price">$${p.precio}</p>
                <button class="btn-buy" onclick="addToCart(${p.id})">Agregar al Carrito</button>
            </div>
        `).join('');
        renderAdminTable();
    }

    function filterBy(cat) { renderStore(productos.filter(p => p.cat === cat)); }

    function checkAdmin() {
        if (document.getElementById('admin-pass').value === "Locuras2026") {
            document.getElementById('admin-auth').style.display = 'none';
            document.getElementById('admin-controls').style.display = 'block';
        } else { alert("Clave incorrecta"); }
    }

    function logoutAdmin() {
        document.getElementById('admin-pass').value = '';
        document.getElementById('admin-controls').style.display = 'none';
        document.getElementById('admin-auth').style.display = 'block';
        document.getElementById('code-output').style.display = 'none';
        closeModal('admin-modal');
        alert("Sesión cerrada. ¡Vuelve pronto!");
    }

    function renderAdminTable() {
        const tbody = document.getElementById('admin-table-body');
        tbody.innerHTML = productos.map(p => `
            <tr>
                <td>${p.nombre}</td>
                <td><input type="number" value="${p.precio}" onchange="editPrice(${p.id}, this.value)" style="width:70px; margin:0;"></td>
                <td><button onclick="deleteProduct(${p.id})" style="color:red; border:none; background:none; cursor:pointer;">Borrar</button></td>
            </tr>
        `).join('');
    }

    function editPrice(id, val) { 
        productos.find(p => p.id === id).precio = parseFloat(val);
        renderStore(productos);
    }

    function deleteProduct(id) {
        if(confirm("¿Borrar este producto?")) {
            productos = productos.filter(p => p.id !== id);
            renderStore(productos);
        }
    }

    function addNewProduct() {
        const n = document.getElementById('add-name').value;
        const pr = document.getElementById('add-price').value;
        const c = document.getElementById('add-cat').value;
        const i = document.getElementById('add-img').value;
        if(n && pr && c && i) {
            productos.push({ id: Date.now(), nombre: n, precio: parseFloat(pr), cat: c, img: i, reviews: [] });
            renderStore(productos);
            alert("Producto añadido exitosamente.");
        }
    }

    function generateCode() {
        const out = document.getElementById('code-output');
        out.style.display = "block";
        out.innerText = `let productos = ${JSON.stringify(productos, null, 4)};`;
        alert("Código generado. Cópialo para actualizar tu index.html permanentemente.");
    }

    function openModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    renderStore(productos);
</script>
</body>
</html>
